version: "3.9"

services:
  app:
    build: .
    container_name: demo-cache-app
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: "redis://redis:6379"   # connect to local redis container
      NODE_ENV: "production"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
